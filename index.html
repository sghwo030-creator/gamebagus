<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Website Anak Muda</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6a11cb,#2575fc);
}

.card{
    width:350px;
    padding:30px;
    text-align:center;
    border-radius:25px;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    color:white;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
}

h1{
    margin-bottom:10px;
    font-size:32px;
}

p{
    opacity:0.8;
    margin-bottom:25px;
}

button{
    border:none;
    padding:12px 25px;
    border-radius:50px;
    background:white;
    color:#2575fc;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}
</style>
</head>
<body>

<div class="card">
    <h1>🚀 Halo!</h1>
    <p>Website modern dengan gaya anak muda.</p>
    <button>Klik Aku</button>
</div>

</body>
</html>
